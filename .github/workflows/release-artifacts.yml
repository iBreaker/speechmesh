name: Release Artifacts

concurrency:
  group: release-artifacts-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.inputs.channel || 'stable' }}
  cancel-in-progress: false

'on':
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: stable
      publish_manifest:
        description: Update releases/<channel>.json on main
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            manifest_platform: linux
            manifest_arch: x86_64
          - name: macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            manifest_platform: macos
            manifest_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-artifacts

      - name: Build release binaries
        run: |
          cargo build --release --target "${{ matrix.target }}" -p speechmesh-app --bin speechmesh
          cargo build --release --target "${{ matrix.target }}" -p speechmeshd --bin speechmeshd

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.toml)
          asset_dir="dist/release-${{ matrix.artifact_suffix }}"
          package_dir="$asset_dir/speechmesh-${version}-${{ matrix.artifact_suffix }}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/speechmesh" "$package_dir/"
          cp "target/${{ matrix.target }}/release/speechmeshd" "$package_dir/"
          cp "target/${{ matrix.target }}/release/speechmesh" "$asset_dir/speechmesh-v${version}-${{ matrix.artifact_suffix }}"
          cp "target/${{ matrix.target }}/release/speechmeshd" "$asset_dir/speechmeshd-v${version}-${{ matrix.artifact_suffix }}"
          shasum -a 256 "$asset_dir/speechmesh-v${version}-${{ matrix.artifact_suffix }}" > "$asset_dir/speechmesh-v${version}-${{ matrix.artifact_suffix }}.sha256"
          shasum -a 256 "$asset_dir/speechmeshd-v${version}-${{ matrix.artifact_suffix }}" > "$asset_dir/speechmeshd-v${version}-${{ matrix.artifact_suffix }}.sha256"
          tar -C "$asset_dir" -czf "$asset_dir/speechmesh-${version}-${{ matrix.artifact_suffix }}.tar.gz" "speechmesh-${version}-${{ matrix.artifact_suffix }}"

      - name: Upload release staging artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/release-${{ matrix.artifact_suffix }}
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/downloaded

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.toml)
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi
          channel="${{ github.event.inputs.channel || 'stable' }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "release_prefix=https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "$tag" \
              --notes "Automated public build artifacts for ${tag}."
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          tag="${{ steps.meta.outputs.tag }}"
          release_files=(
            "dist/downloaded/release-linux-x86_64/speechmesh-${tag}-linux-x86_64"
            "dist/downloaded/release-linux-x86_64/speechmesh-${tag}-linux-x86_64.sha256"
            "dist/downloaded/release-linux-x86_64/speechmeshd-${tag}-linux-x86_64"
            "dist/downloaded/release-linux-x86_64/speechmeshd-${tag}-linux-x86_64.sha256"
            "dist/downloaded/release-linux-x86_64/speechmesh-${version}-linux-x86_64.tar.gz"
            "dist/downloaded/release-macos-arm64/speechmesh-${tag}-macos-arm64"
            "dist/downloaded/release-macos-arm64/speechmesh-${tag}-macos-arm64.sha256"
            "dist/downloaded/release-macos-arm64/speechmeshd-${tag}-macos-arm64"
            "dist/downloaded/release-macos-arm64/speechmeshd-${tag}-macos-arm64.sha256"
            "dist/downloaded/release-macos-arm64/speechmesh-${version}-macos-arm64.tar.gz"
          )
          declare -A seen_names=()
          for file in "${release_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "missing release file: $file" >&2
              exit 1
            fi
            name="$(basename "$file")"
            if [[ -n "${seen_names[$name]:-}" ]]; then
              echo "duplicate release asset name resolved: $name" >&2
              exit 1
            fi
            seen_names["$name"]=1
          done
          printf 'uploading release file: %s\n' "${release_files[@]}"
          gh release upload "$tag" \
            "${release_files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Build update manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          channel="${{ steps.meta.outputs.channel }}"
          tag="${{ steps.meta.outputs.tag }}"
          mkdir -p dist/release-manifests
          ./scripts/build_update_manifest.sh \
            --version "$version" \
            --channel "$channel" \
            --release-prefix "${{ steps.meta.outputs.release_prefix }}" \
            --output "dist/release-manifests/${channel}.json" \
            --asset "linux:x86_64:dist/downloaded/release-linux-x86_64/speechmesh-${tag}-linux-x86_64" \
            --asset "macos:aarch64:dist/downloaded/release-macos-arm64/speechmesh-${tag}-macos-arm64"

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          channel="${{ steps.meta.outputs.channel }}"
          gh release upload "$tag" "dist/release-manifests/${channel}.json" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish manifest to main
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_manifest == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ steps.meta.outputs.channel }}"
          tag="${{ steps.meta.outputs.tag }}"
          manifest_src="dist/release-manifests/${channel}.json"
          target_path="releases/${channel}.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p releases
            cp "${manifest_src}" "${target_path}"
            git add "${target_path}"
            if git diff --cached --quiet -- "${target_path}"; then
              echo "manifest unchanged"
              exit 0
            fi
            git commit -m "chore: update ${channel} release manifest for ${tag}"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push rejected on attempt ${attempt}; retrying after refreshing origin/main"
            git reset --hard origin/main
          done

          echo "failed to publish ${target_path} after multiple retries" >&2
          exit 1
