name: Build Artifacts

'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'app/**'
      - 'core/**'
      - 'asr/**'
      - 'tts/**'
      - 'transport/**'
      - 'device/**'
      - 'bridges/**'
      - 'speechmeshd/**'
      - 'sdks/rust/**'
      - '.github/workflows/build-artifacts.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'app/**'
      - 'core/**'
      - 'asr/**'
      - 'tts/**'
      - 'transport/**'
      - 'device/**'
      - 'bridges/**'
      - 'speechmeshd/**'
      - 'sdks/rust/**'
      - '.github/workflows/build-artifacts.yml'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - name: macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-artifacts

      - name: Build release binaries
        run: |
          cargo build --release --target "${{ matrix.target }}" -p speechmesh-app --bin speechmesh
          cargo build --release --target "${{ matrix.target }}" -p speechmeshd --bin speechmeshd

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.toml)
          stage_dir="dist/speechmesh-${version}-${{ matrix.artifact_suffix }}"
          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/speechmesh" "$stage_dir/"
          cp "target/${{ matrix.target }}/release/speechmeshd" "$stage_dir/"
          shasum -a 256 "$stage_dir/speechmesh" > "$stage_dir/speechmesh.sha256"
          shasum -a 256 "$stage_dir/speechmeshd" > "$stage_dir/speechmeshd.sha256"
          tar -C dist -czf "dist/speechmesh-${version}-${{ matrix.artifact_suffix }}.tar.gz" "speechmesh-${version}-${{ matrix.artifact_suffix }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: speechmesh-${{ matrix.artifact_suffix }}
          path: |
            dist/*.tar.gz
            dist/speechmesh-*/speechmesh.sha256
            dist/speechmesh-*/speechmeshd.sha256
          if-no-files-found: error
